<div class="confirm-delete-dialog">
  <div class="header">
    <span>Delete Comment</span>
  </div>
  <div class="body">
    <p class="mb-0">
      Are you sure you want to delete this comment? This will remove the comment
      and can't be undone.
    </p>
  </div>
  <div class="actions">
    <button class="btn-cancel" (click)="onCancel()">NO, CANCEL</button>
    <button class="btn-delete" (click)="onConfirm()">YES, DELETE</button>
  </div>
</div>
